<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Diabetes Prediction</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <h1>🩺 Diabetes Prediction</h1>

    <form method="post" action="/predict">

        <div class="form-group">
            <label>Age</label>
            <input name="age" type="number" required>
        </div>

        <div class="form-group">
            <label>Hypertension</label>
            <select name="hypertension">
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="form-group">
            <label>Heart Disease</label>
            <select name="heart_disease">
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="form-group">
            <label>BMI</label>
            <input name="bmi" type="number" step="0.1" required>
        </div>

        <div class="form-group">
            <label>HbA1c Level</label>
            <input name="HbA1c_level" type="number" step="0.1" required>
        </div>

        <div class="form-group">
            <label>Blood Glucose Level</label>
            <input name="blood_glucose_level" type="number" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select name="gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Smoking History</label>
            <select name="smoking_history">
                <option value="never">Never</option>
                <option value="former">Former</option>
                <option value="current">Current</option>
                <option value="ever">Ever</option>
                <option value="not current">Not Current</option>
            </select>
        </div>

        <button type="submit">Predict</button>

    </form>

    {% if result %}
        <div id="result"
             class="result {% if 'High' in result %}danger{% else %}success{% endif %}">
            {{ result }}
        </div>
    {% endif %}

</div>

<!-- AUTO SCROLL SCRIPT -->
<script>
    window.onload = function () {
        const result = document.getElementById("result");
        if (result) {
            result.scrollIntoView({ behavior: "smooth" });
        }
    }
</script>

</body>
</html>
